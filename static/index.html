<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ml-sharp · spatial wallpaper demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0c;
      --panel: rgba(20,20,24,0.72);
      --line: rgba(255,255,255,0.08);
      --fg: #e9e9ef;
      --muted: #8a8a96;
      --accent: #5a8dee;
      --warn: #ff5a6b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: radial-gradient(ellipse at 30% 0%, #1a1a22 0%, var(--bg) 60%);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    #viewer { position: fixed; inset: 0; z-index: 0; background: #000; }
    #viewer canvas { display: block; }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: var(--panel);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      width: 320px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }
    .panel h1 { font-size: 14px; margin: 0 0 8px; font-weight: 600; letter-spacing: .2px; }
    .panel p.sub { font-size: 12px; color: var(--muted); margin: 0 0 14px; line-height: 1.45; }
    .row { display: flex; gap: 8px; align-items: center; }
    .btn {
      appearance: none; border: 0; cursor: pointer;
      background: var(--accent); color: white; font-weight: 600;
      padding: 8px 12px; border-radius: 9px; font-size: 13px;
      transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.55; cursor: progress; }
    .btn.ghost { background: rgba(255,255,255,0.08); color: var(--fg); }
    input[type=file] { display: none; }
    .status {
      font-size: 12px; color: var(--muted); margin-top: 10px;
      min-height: 16px; word-break: break-word;
    }
    .status.err { color: var(--warn); }
    .thumb-row { display: flex; gap: 8px; margin-top: 12px; }
    .thumb {
      width: 90px; height: 90px; border-radius: 10px;
      background: #1a1a22 center/cover no-repeat;
      border: 1px solid var(--line);
      flex-shrink: 0;
    }
    .meta { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .meta b { color: var(--fg); font-weight: 500; }

    .controls {
      position: fixed; right: 18px; bottom: 18px; z-index: 10;
      display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
    }
    .joystick {
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), rgba(0,0,0,0.45));
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      position: relative; touch-action: none;
      cursor: grab;
    }
    .joystick.dragging { cursor: grabbing; }
    .joystick::before {
      content: ""; position: absolute; inset: 50% 8% auto 8%; height: 1px;
      background: rgba(255,255,255,0.06);
    }
    .joystick::after {
      content: ""; position: absolute; left: 50%; top: 8%; bottom: 8%; width: 1px;
      background: rgba(255,255,255,0.06);
    }
    .knob {
      position: absolute; left: 50%; top: 50%;
      width: 46px; height: 46px; margin: -23px 0 0 -23px;
      border-radius: 50%;
      background: linear-gradient(180deg, #f4f5fa 0%, #b6b9c8 100%);
      box-shadow: 0 6px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6);
      transition: transform .25s cubic-bezier(.2,.7,.2,1.2);
      will-change: transform;
    }
    .joystick.dragging .knob { transition: none; }
    .hint {
      font-size: 11px; color: var(--muted); padding: 6px 10px;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; backdrop-filter: blur(12px);
    }
    .sliders {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 10px 12px; backdrop-filter: blur(16px);
      display: flex; flex-direction: column; gap: 6px; min-width: 180px;
    }
    .sliders label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
    .sliders input[type=range] { width: 100%; accent-color: var(--accent); }
    .axis-flip { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      font-size: 11px; padding: 3px 8px; border-radius: 999px;
      border: 1px solid var(--line); background: rgba(255,255,255,0.04);
      cursor: pointer; user-select: none;
    }
    .pill.active { background: var(--accent); border-color: var(--accent); color: white; }
  </style>
</head>
<body>
  <div id="viewer"></div>

  <div class="panel">
    <h1>ml-sharp · spatial wallpaper</h1>
    <p class="sub">Upload a photo. Apple's <b>SHARP</b> turns it into a 3D Gaussian splat. Drag the ball to tilt the view, like an iOS 26 spatial wallpaper anchored on the original perspective.</p>

    <div class="row">
      <label class="btn" for="file">Choose image</label>
      <input id="file" type="file" accept="image/jpeg,image/png,image/webp,image/bmp" />
      <button class="btn ghost" id="reset">Reset view</button>
    </div>

    <div id="status" class="status">Idle.</div>

    <div class="thumb-row">
      <div id="thumb" class="thumb" title="Source image"></div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <div class="controls">
    <div class="sliders">
      <label>Tilt range <span id="tilt-val">12°</span></label>
      <input id="tilt" type="range" min="2" max="30" value="12" />
      <label>Parallax <span id="par-val">0.10</span></label>
      <input id="par" type="range" min="0" max="40" value="10" />
      <label>Splat orientation</label>
      <div class="axis-flip">
        <span class="pill active" data-flip="default">default</span>
        <span class="pill" data-flip="flipY">flip Y</span>
        <span class="pill" data-flip="flipZ">flip Z</span>
        <span class="pill" data-flip="flipYZ">flip Y+Z</span>
      </div>
    </div>
    <div class="hint">Drag the ball to tilt · release to recenter</div>
    <div class="joystick" id="joystick"><div class="knob" id="knob"></div></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.160.1",
      "three/": "https://esm.sh/three@0.160.1/",
      "@mkkellogg/gaussian-splats-3d": "https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7?deps=three@0.160.1"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import * as GS3D from '@mkkellogg/gaussian-splats-3d';

    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');
    const fileEl = $('file');
    const thumbEl = $('thumb');
    const metaEl = $('meta');
    const resetEl = $('reset');
    const joystick = $('joystick');
    const knob = $('knob');
    const tiltSlider = $('tilt');
    const parSlider = $('par');
    const tiltVal = $('tilt-val');
    const parVal = $('par-val');

    let viewer = null;
    let currentSplatUrl = null;
    let baseMetaHtml = '';

    // Drag state, normalized to [-1, 1]
    const drag = { x: 0, y: 0, active: false, target: { x: 0, y: 0 } };

    // Camera anchor — set once a splat is loaded.
    const SHARP_FORWARD = new THREE.Vector3(0, 0, 1);
    const SHARP_WORLD_UP = new THREE.Vector3(0, -1, 0);

    const anchor = {
      position: new THREE.Vector3(0, 0, 0),
      lookAt: new THREE.Vector3(0, 0, 1),
      right: new THREE.Vector3(1, 0, 0),
      up: SHARP_WORLD_UP.clone(),
      forward: SHARP_FORWARD.clone(),
      distance: 1.0,
    };

    let orientation = 'default';

    function setStatus(msg, isErr = false) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('err', isErr);
    }

    function flipMatrix(name) {
      const m = new THREE.Matrix4();
      if (name === 'flipY') m.makeScale(1, -1, 1);
      else if (name === 'flipZ') m.makeScale(1, 1, -1);
      else if (name === 'flipYZ') m.makeScale(1, -1, -1);
      return m;
    }

    function positionCameraFromAnchor() {
      if (!viewer?.camera) return;
      const cam = viewer.camera;
      cam.position.copy(anchor.position);
      cam.up.copy(anchor.up);
      cam.lookAt(anchor.lookAt);
      cam.updateMatrixWorld(true);
    }

    async function destroyViewer() {
      if (!viewer) return;
      try {
        viewer.setRenderMode && viewer.setRenderMode(GS3D.RenderMode.Never);
        await viewer.dispose();
      } catch (e) { console.warn('dispose:', e); }
      const host = $('viewer');
      while (host.firstChild) host.removeChild(host.firstChild);
      viewer = null;
    }

    async function loadSplat(url) {
      await destroyViewer();
      currentSplatUrl = url;

      viewer = new GS3D.Viewer({
        rootElement: $('viewer'),
        cameraUp: [0, -1, 0],
        initialCameraPosition: [0, 0, 0.0001],
        initialCameraLookAt: [0, 0, 1],
        sphericalHarmonicsDegree: 0,
        selfDrivenMode: true,
        useBuiltInControls: false,
        sharedMemoryForWorkers: false,
        gpuAcceleratedSort: false,
        antialiased: false,
        renderMode: GS3D.RenderMode.Always,
      });

      const orientationMatrix = flipMatrix(orientation);

      await viewer.addSplatScene(url, {
        format: GS3D.SceneFormat.Ply,
        progressiveLoad: false,
        showLoadingUI: true,
        rotation: new THREE.Quaternion().setFromRotationMatrix(orientationMatrix).toArray(),
      });

      viewer.start();
      positionCameraFromAnchor();

      // SHARP splats are in a camera-centric space where content sits at +Z.
      // Retry a few frames because the splat mesh bounds are not always ready
      // on the first RAF after addSplatScene() resolves.
      scheduleSceneFit();
      setStatus(`Loaded splat (${(viewer?.splatMesh?.getSplatCount?.() ?? '?')} gaussians)`);
    }

    function scheduleSceneFit(attempt = 0) {
      if (fitAnchorToScene()) return;
      if (attempt >= 24) {
        console.warn('Unable to fit scene bounds, keeping default SHARP camera pose.');
        positionCameraFromAnchor();
        return;
      }
      requestAnimationFrame(() => scheduleSceneFit(attempt + 1));
    }

    function fitAnchorToScene() {
      try {
        const splatMesh = viewer?.splatMesh;
        if (!splatMesh) return false;
        const box = new THREE.Box3().setFromObject(splatMesh);
        if (!Number.isFinite(box.min.x) || !Number.isFinite(box.max.x)) return false;
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const radius = Math.max(size.length() * 0.5, 0.35);

        // Put the camera slightly in front of the splat volume and look toward
        // its center. This avoids the common "all black" failure mode where the
        // viewer starts at the origin but faces the wrong Z direction.
        const fov = THREE.MathUtils.degToRad(viewer?.camera?.fov || 65);
        const fitDistance = radius / Math.tan(fov * 0.5);
        const cameraDistance = Math.max(fitDistance * 1.1, radius * 1.5, 0.8);

        anchor.lookAt.copy(center);
        anchor.position.copy(center).addScaledVector(SHARP_FORWARD, -cameraDistance);
        anchor.distance = anchor.position.distanceTo(center);
        anchor.forward.copy(center).sub(anchor.position).normalize();
        anchor.right.crossVectors(anchor.forward, SHARP_WORLD_UP);
        if (anchor.right.lengthSq() < 1e-6) anchor.right.set(1, 0, 0);
        anchor.right.normalize();
        anchor.up.crossVectors(anchor.right, anchor.forward).normalize();
        positionCameraFromAnchor();

        metaEl.innerHTML = `${baseMetaHtml}<br><b>Splats:</b> ${splatMesh.getSplatCount?.() ?? '?'}<br><b>Bounds:</b> ${size.x.toFixed(2)}×${size.y.toFixed(2)}×${size.z.toFixed(2)}`;
        return true;
      } catch (e) {
        console.warn('fitAnchorToScene:', e);
        return false;
      }
    }

    // ------- Camera animation loop, decoupled from viewer's RAF -------
    function tick() {
      // Smoothly chase target with spring-back when not dragging.
      const stiffness = drag.active ? 0.35 : 0.18;
      drag.x += (drag.target.x - drag.x) * stiffness;
      drag.y += (drag.target.y - drag.y) * stiffness;

      if (viewer && viewer.camera) {
        const maxAngle = THREE.MathUtils.degToRad(parseFloat(tiltSlider.value));
        const parallax = parseFloat(parSlider.value) / 100;

        const yaw = -drag.x * maxAngle;
        const pitch = -drag.y * maxAngle;

        // Build offset position around the fitted anchor in anchor-local axes.
        const offset = new THREE.Vector3()
          .addScaledVector(anchor.right, drag.x * parallax)
          .addScaledVector(anchor.up, -drag.y * parallax);

        const cam = viewer.camera;
        cam.position.copy(anchor.position).add(offset);

        // Compute look direction by rotating anchor.forward by yaw/pitch
        const q = new THREE.Quaternion();
        const qYaw = new THREE.Quaternion().setFromAxisAngle(anchor.up, yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(anchor.right, pitch);
        q.copy(qYaw).multiply(qPitch);
        const dir = anchor.forward.clone().applyQuaternion(q);
        const target = cam.position.clone().add(dir.multiplyScalar(anchor.distance));
        cam.up.copy(anchor.up);
        cam.lookAt(target);
        cam.updateMatrixWorld(true);
      }
      requestAnimationFrame(tick);
    }
    tick();

    // ------- Drag ball -------
    const RADIUS = 47; // max knob travel from center, px
    function setKnob(nx, ny) {
      const px = nx * RADIUS;
      const py = ny * RADIUS;
      knob.style.transform = `translate(${px}px, ${py}px)`;
    }
    function clampDisk(x, y) {
      const r = Math.hypot(x, y);
      if (r <= 1) return [x, y];
      return [x / r, y / r];
    }
    function pointerToNorm(ev) {
      const rect = joystick.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const x = (ev.clientX - cx) / RADIUS;
      const y = (ev.clientY - cy) / RADIUS;
      return clampDisk(x, y);
    }
    joystick.addEventListener('pointerdown', (ev) => {
      drag.active = true;
      joystick.classList.add('dragging');
      joystick.setPointerCapture(ev.pointerId);
      const [x, y] = pointerToNorm(ev);
      drag.target.x = x; drag.target.y = y;
      setKnob(x, y);
    });
    joystick.addEventListener('pointermove', (ev) => {
      if (!drag.active) return;
      const [x, y] = pointerToNorm(ev);
      drag.target.x = x; drag.target.y = y;
      setKnob(x, y);
    });
    const release = (ev) => {
      if (!drag.active) return;
      drag.active = false;
      joystick.classList.remove('dragging');
      try { joystick.releasePointerCapture(ev.pointerId); } catch {}
      drag.target.x = 0; drag.target.y = 0;
      setKnob(0, 0);
    };
    joystick.addEventListener('pointerup', release);
    joystick.addEventListener('pointercancel', release);

    // ------- Sliders + axis flip -------
    tiltSlider.addEventListener('input', () => tiltVal.textContent = `${tiltSlider.value}°`);
    parSlider.addEventListener('input', () => parVal.textContent = (parSlider.value / 100).toFixed(2));
    document.querySelectorAll('.pill[data-flip]').forEach((el) => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.pill[data-flip]').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        orientation = el.dataset.flip;
        if (currentSplatUrl) loadSplat(currentSplatUrl);
      });
    });

    resetEl.addEventListener('click', () => {
      drag.target.x = 0; drag.target.y = 0;
      setKnob(0, 0);
    });

    // ------- Upload flow -------
    fileEl.addEventListener('change', async () => {
      const file = fileEl.files?.[0];
      if (!file) return;
      thumbEl.style.backgroundImage = `url(${URL.createObjectURL(file)})`;
      baseMetaHtml = `<b>${file.name}</b><br>${(file.size / 1024).toFixed(0)} KB`;
      metaEl.innerHTML = baseMetaHtml;
      setStatus('Uploading & running SHARP… (first run can take a minute while weights load)');
      const startBtn = document.querySelector('label[for=file]');
      startBtn.style.pointerEvents = 'none';
      startBtn.style.opacity = '0.55';
      try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch('/api/process', { method: 'POST', body: fd });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${r.status}: ${err.stderr ?? ''}`);
        }
        const j = await r.json();
        baseMetaHtml = `<b>${file.name}</b><br>${(j.ply_size/1024/1024).toFixed(1)} MB · ${j.elapsed_sec}s`;
        metaEl.innerHTML = baseMetaHtml;
        setStatus('Loading splat…');
        await loadSplat(j.ply_url);
      } catch (e) {
        console.error(e);
        setStatus(`Error: ${e.message}`, true);
      } finally {
        startBtn.style.pointerEvents = '';
        startBtn.style.opacity = '';
      }
    });

    setStatus('Ready. Pick an image to begin.');
  </script>
</body>
</html>
